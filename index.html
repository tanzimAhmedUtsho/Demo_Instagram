<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <nav class="bg-white border-b sticky top-0 z-50 p-3">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1
          class="text-xl md:text-2xl font-bold italic font-serif cursor-pointer"
        >
          Instagram
        </h1>

        <div class="hidden sm:block relative w-32 md:w-64">
          <input
            type="text"
            id="search-input"
            placeholder="Search usernames..."
            class="bg-gray-100 border rounded-lg py-1.5 px-4 text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 w-full"
            onkeyup="filterPosts()"
          />
        </div>

        <div class="flex items-center space-x-4 md:space-x-6">
          <i data-lucide="home" class="cursor-pointer w-6 h-6"></i>
          <i data-lucide="plus-square" class="cursor-pointer w-6 h-6"></i>
          <i data-lucide="heart" class="cursor-pointer w-6 h-6"></i>
          <div
            class="w-7 h-7 rounded-full bg-gray-200 border border-gray-300 cursor-pointer overflow-hidden"
          >
            <img
              src="https://i.pravatar.cc/150?u=myprofile"
              alt="profile"
              class="w-full h-full object-cover"
            />
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-lg mx-auto pt-5">
      <div
        id="story-container"
        class="bg-white border rounded-lg p-4 mb-5 flex space-x-4 overflow-x-auto scrollbar-hide"
      ></div>

      <div id="feed-container"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
