<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* স্ক্রলবার লুকানোর জন্য কাস্টম সিএসএস */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <nav class="bg-white border-b sticky top-0 z-50 p-3">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1
          class="text-xl md:text-2xl font-bold italic font-serif cursor-pointer tracking-tighter"
        >
          Instagram
        </h1>

        <div class="hidden sm:block relative w-32 md:w-64">
          <input
            type="text"
            id="search-input"
            placeholder="Search usernames..."
            class="bg-gray-100 border border-transparent rounded-lg py-1.5 px-4 text-sm focus:outline-none focus:bg-white focus:border-gray-300 transition-all w-full"
            onkeyup="filterPosts()"
          />
        </div>

        <div class="flex items-center space-x-4 md:space-x-6">
          <i
            data-lucide="home"
            class="cursor-pointer w-6 h-6 hover:scale-110 transition-transform"
          ></i>
          <i
            data-lucide="plus-square"
            class="cursor-pointer w-6 h-6 hover:scale-110 transition-transform"
          ></i>
          <i
            data-lucide="heart"
            class="cursor-pointer w-6 h-6 hover:scale-110 transition-transform"
          ></i>
          <div
            class="w-7 h-7 rounded-full bg-gray-200 border border-gray-300 cursor-pointer overflow-hidden active:scale-90 transition-transform"
          >
            <img
              src="https://i.pravatar.cc/150?u=myprofile"
              alt="profile"
              class="w-full h-full object-cover"
            />
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-lg mx-auto pt-5 pb-10">
      <div
        id="story-container"
        class="bg-white border rounded-lg p-4 mb-5 flex space-x-4 overflow-x-auto scrollbar-hide shadow-sm"
      ></div>

      <div id="feed-container"></div>
    </main>

    <div
      id="profile-modal"
      class="fixed inset-0 bg-black bg-opacity-60 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm"
    >
      <div
        class="bg-white w-full max-w-sm rounded-2xl overflow-hidden relative shadow-2xl"
      >
        <button
          onclick="closeProfile()"
          class="absolute top-4 right-4 text-gray-400 hover:text-black transition-colors"
        >
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>

        <div class="p-8">
          <div class="flex flex-col items-center">
            <div
              class="w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-yellow-400 via-orange-500 to-fuchsia-600 mb-4"
            >
              <div class="bg-white p-1 rounded-full w-full h-full">
                <img
                  id="modal-user-img"
                  src=""
                  class="w-full h-full rounded-full object-cover"
                />
              </div>
            </div>

            <h2
              id="modal-username"
              class="text-xl font-bold text-gray-800"
            ></h2>
            <p
              id="modal-location"
              class="text-gray-500 text-sm mb-6 flex items-center"
            >
              <i data-lucide="map-pin" class="w-3 h-3 mr-1"></i>
              <span id="modal-loc-text"></span>
            </p>

            <div
              class="flex space-x-8 border-y border-gray-100 w-full py-5 justify-center"
            >
              <div class="text-center">
                <span class="block font-bold text-gray-800">১৪</span>
                <span class="text-[10px] text-gray-400 uppercase font-semibold"
                  >Posts</span
                >
              </div>
              <div class="text-center">
                <span class="block font-bold text-gray-800">৮৫০</span>
                <span class="text-[10px] text-gray-400 uppercase font-semibold"
                  >Followers</span
                >
              </div>
              <div class="text-center">
                <span class="block font-bold text-gray-800">৩২০</span>
                <span class="text-[10px] text-gray-400 uppercase font-semibold"
                  >Following</span
                >
              </div>
            </div>

            <button
              class="mt-8 bg-blue-500 text-white px-8 py-2 rounded-full font-bold w-full hover:bg-blue-600 transition-all active:scale-95 shadow-md"
            >
              Follow
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
