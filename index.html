<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <nav class="bg-white border-b sticky top-0 z-50 p-3">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold italic font-serif">Instagram</h1>
        <div class="flex items-center space-x-6">
          <i data-lucide="home" class="cursor-pointer"></i>
          <i data-lucide="plus-square" class="cursor-pointer"></i>
          <i data-lucide="heart" class="cursor-pointer"></i>
          <div
            class="w-7 h-7 rounded-full bg-gray-200 border cursor-pointer"
          ></div>
        </div>
      </div>
    </nav>

    <main class="max-w-lg mx-auto pt-5">
      <div
        id="story-container"
        class="bg-white border rounded-lg p-4 mb-5 flex space-x-4 overflow-x-auto"
      ></div>

      <div id="feed-container"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
